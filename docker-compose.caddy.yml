# HTTPS variant: run Caddy in front of n8n so Telegram Bot API's setWebhook
# accepts the URL. Requires a real domain with A/AAAA records pointing at
# the VPS (N8N_HOST in .env) and ports 80 + 443 open.
#
# Start with:
#   docker compose -f docker-compose.yml -f docker-compose.caddy.yml up -d
#
# Caddy auto-provisions a Let's Encrypt certificate for N8N_HOST.

services:
  n8n:
    ports: !reset []
    expose:
      - "5678"
    environment:
      N8N_PROTOCOL: https
      N8N_PORT: 5678
      N8N_EDITOR_BASE_URL: https://${N8N_HOST}
      WEBHOOK_URL: https://${N8N_HOST}/

  caddy:
    image: caddy:2
    container_name: clinic-admin-assistant-caddy
    restart: unless-stopped
    depends_on:
      - n8n
    ports:
      - "80:80"
      - "443:443"
    environment:
      N8N_HOST: ${N8N_HOST}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
